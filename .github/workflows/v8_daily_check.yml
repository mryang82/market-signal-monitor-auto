name: v8 Signal Check

on:
  schedule:
    # KST 07:17 = UTC 22:17 (전일) — 미 시장 마감 후
    - cron: '17 22 * * 1-5'
    # KST 22:17 = UTC 13:17 (당일) — 미 시장 개장 전
    - cron: '17 13 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run v8 signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python auto_signal_v8.py
      
      - name: Verify data.json
        run: |
          if [ ! -f data.json ]; then
            echo "❌ data.json 생성 안 됨!"
            exit 1
          fi
          echo "✓ data.json 존재 확인"
          python -c "import json; d=json.load(open('data.json')); print(f\"timestamp: {d.get('timestamp','N/A')}\"); print(f\"fg: {d.get('fg','N/A')}\"); print(f\"level: {d.get('level','N/A')}\")"
      
      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Signal Bot"
          
          git add data.json previous_signal.json 2>/dev/null || true
          
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — commit 생략"
          else
            git commit -m "📊 v8 Signal update $(date -u +%Y-%m-%dT%H:%MZ)"
            echo "Push 시도..."
            git push origin main
            echo "✓ Push 완료"
          fi
