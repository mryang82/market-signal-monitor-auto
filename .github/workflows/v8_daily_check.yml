name: v8 Signal Check

on:
  schedule:
    # KST 07:17 = UTC 22:17 (전일) — 미 시장 마감 후
    - cron: '17 22 * * 1-5'
    # KST 22:17 = UTC 13:17 (당일) — 미 시장 개장 전
    - cron: '17 13 * * 1-5'
  workflow_dispatch:  # 수동 실행 버튼

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run v8 signal check
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python auto_signal_v8.py
      
      - name: Save signal state
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Signal Bot"
          git add previous_signal.json data.json || true
          git diff --staged --quiet || git commit -m "📊 Signal state + data update"
          git push || true
